services:
  app:
    build:
      context: .
      target: runtime
    image: asset-register-app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-asset_register}
      DB_USERNAME: ${DB_USERNAME:-asset}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SWAGGER_USER: ${SWAGGER_USER:-swagger}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:-secret}
    volumes:
      - storage_data:/var/www/storage/app
      - logs_data:/var/www/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  webserver:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
    depends_on:
      - app
    networks:
      - internal

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-asset_register}
      MYSQL_USER: ${DB_USERNAME:-asset}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  db_data:
  storage_data:
  logs_data:

networks:
  internal:
    driver: bridge
